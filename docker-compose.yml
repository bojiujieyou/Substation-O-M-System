# docker-compose.yml - Substation Monitor Platform (fnOS/NAS)

services:
  app:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: substation_monitor
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=False
      - API_TOKEN=${API_TOKEN:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - DATABASE_PATH=/app/data/station_monitor.db
      - PHOTO_ROOT_PATH=/app/photos
      - DATA_SOURCE_PATH=/app/source_docs
    volumes:
      - /vol1/1000/Docker/Substation-O-M-System/data:/app/data
      - /vol1/1000/备份/办公/图像监控/照片:/app/photos:ro
      - /vol1/1000/备份/办公/图像监控/图像监控设备资料:/app/source_docs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sqlite3, os, sys; urllib.request.urlopen('http://localhost:5000/health', timeout=5); sqlite3.connect(os.environ.get('DATABASE_PATH', '/app/data/station_monitor.db')).close(); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - /vol1/1000/Docker/Substation-O-M-System/.env

  backup:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: substation_monitor_backup
    volumes:
      - /vol1/1000/Docker/Substation-O-M-System/data:/app/data:ro
      - /vol1/1000/Docker/Substation-O-M-System/backups:/app/backups
    entrypoint: ["python", "-c", "import time, sqlite3, os\nfrom datetime import datetime\n\ndef backup_db():\n    src = '/app/data/station_monitor.db'\n    dst = f'/app/backups/station_monitor_{datetime.now().strftime(\"%Y%m%d_%H%M%S\")}.db'\n    if os.path.exists(src):\n        src_conn = sqlite3.connect(f'file:{src}?mode=ro', uri=True)\n        dst_conn = sqlite3.connect(dst)\n        src_conn.backup(dst_conn)\n        src_conn.close()\n        dst_conn.close()\n        print(f'Backup saved: {dst}')\n\nwhile True:\n    now = datetime.now()\n    if now.hour == 2 and now.minute == 0:\n        backup_db()\n    time.sleep(60)\n"]
    restart: unless-stopped
    env_file:
      - /vol1/1000/Docker/Substation-O-M-System/.env
