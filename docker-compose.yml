services:
  postgres:
    image: postgres:16
    container_name: substation_monitor_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-station_monitor}
      - POSTGRES_USER=${POSTGRES_USER:-station_monitor}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
    volumes:
      - /vol1/1000/Docker/Substation-O-M-System/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-station_monitor} -d ${POSTGRES_DB:-station_monitor}"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: substation_monitor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=False
      - API_TOKEN=${API_TOKEN:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://station_monitor:change_me@postgres:5432/station_monitor}
      - DATABASE_PATH=/app/data/station_monitor.db
      - APP_DATA_DIR=/app/data
      - PHOTO_ROOT_PATH=/app/photos
      - DATA_SOURCE_PATH=/app/source_docs
    volumes:
      - /vol1/1000/Docker/Substation-O-M-System/data:/app/data
      - /vol1/1000/ТЙХтЏдтћц/жЇћуѓ▓тЈЋ/жЇЦТЃДтёџжљЕТѕътИХ/жљЊЛЁтбќ:/app/photos:ro
      - /vol1/1000/ТЙХтЏдтћц/жЇћуѓ▓тЈЋ/жЇЦТЃДтёџжљЕТѕътИХ/жЇЦТЃДтёџжљЕТѕътИХуњЂТЃДЬўгуњДтІгТъА:/app/source_docs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file:
      - /vol1/1000/Docker/Substation-O-M-System/.env
