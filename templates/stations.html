{% extends "base.html" %}

{% block title %}变电站列表 - 变电站图像监控运维平台{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2 class="page-title">变电站列表</h2>
        <div class="page-actions station-page-actions">
            {% if session.get('role') == 'admin' %}
            <button id="stations-create-btn" class="btn btn-primary stations-create-btn" onclick="openCreateModal()">新建变电站</button>
            {% endif %}
            <select id="county-filter" class="form-select station-county-filter">
                <option value="">全部区县</option>
                <option value="丽水">丽水</option>
                <option value="云和">云和</option>
                <option value="庆元">庆元</option>
                <option value="景宁">景宁</option>
                <option value="松阳">松阳</option>
                <option value="缙云">缙云</option>
                <option value="遂昌">遂昌</option>
                <option value="青田">青田</option>
                <option value="龙泉">龙泉</option>
            </select>
        </div>
    </div>

    <div id="loading" class="loading-state">
        <div class="spinner"></div>
        <span>加载中...</span>
    </div>

    <div id="error" class="error-state" style="display:none;">
        <span class="error-icon">!</span>
        <span>加载失败</span>
        <button class="btn btn-sm btn-secondary" onclick="loadStations()">重试</button>
    </div>

    <div id="empty" class="empty-state" style="display:none;">
        <p>暂无变电站数据</p>
        <p class="text-muted">请先在管理后台导入台账或手工创建站点。</p>
        <a href="{{ url_for('admin_page') }}" class="btn btn-primary btn-sm" style="margin-top: 12px;" data-project-link>前往管理后台</a>
    </div>

    <div id="station-list" class="station-list" style="display:none;">
        <table class="data-table table-cards">
            <thead>
                <tr>
                    <th>变电站名称</th>
                    <th>电压等级</th>
                    <th>区县</th>
                    <th>位置</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="station-tbody"></tbody>
        </table>
    </div>
</div>

<div class="modal" id="detail-modal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modal-title">变电站详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <a href="#" id="modal-report-btn" class="btn btn-primary">报故障</a>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="create-modal" tabindex="-1" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="create-modal-title">新建变电站</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <form id="create-station-form">
                    <div class="mb-3">
                        <label class="form-label">变电站名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="name" required placeholder="例如：莲都变电站">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">电压等级 <span class="text-danger">*</span></label>
                        <select class="form-select" name="voltage_level" required>
                            <option value="">请选择</option>
                            <option value="35kV">35kV</option>
                            <option value="110kV">110kV</option>
                            <option value="220kV">220kV</option>
                            <option value="500kV">500kV</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">区县</label>
                        <select class="form-select" name="county">
                            <option value="">请选择</option>
                            <option value="丽水">丽水</option>
                            <option value="云和">云和</option>
                            <option value="庆元">庆元</option>
                            <option value="景宁">景宁</option>
                            <option value="松阳">松阳</option>
                            <option value="缙云">缙云</option>
                            <option value="遂昌">遂昌</option>
                            <option value="青田">青田</option>
                            <option value="龙泉">龙泉</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">位置</label>
                        <input type="text" class="form-control" name="location" placeholder="详细地址">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">IP 网段</label>
                        <input type="text" class="form-control" name="ip_range" placeholder="例如：192.168.1.0/24">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">NVR IP</label>
                            <input type="text" class="form-control" name="nvr_ip" placeholder="例如：192.168.1.100">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">NVR 端口</label>
                            <input type="number" class="form-control" name="nvr_port" placeholder="例如：8000">
                        </div>
                    </div>
                    <div id="create-error" class="alert alert-danger" style="display:none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="create-submit-btn" onclick="submitCreateStation()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allStations = [];

function withProject(path, extraParams) {
    if (window.AppProjectState && typeof window.AppProjectState.withProject === 'function') {
        return window.AppProjectState.withProject(path, extraParams);
    }
    const url = new URL(path, window.location.origin);
    if (extraParams) {
        Object.entries(extraParams).forEach(([key, value]) => {
            if (value !== undefined && value !== null && value !== '') {
                url.searchParams.set(key, value);
            }
        });
    }
    return `${url.pathname}${url.search}${url.hash}`;
}

function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}

async function loadStations() {
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const empty = document.getElementById('empty');
    const list = document.getElementById('station-list');

    loading.style.display = 'flex';
    error.style.display = 'none';
    empty.style.display = 'none';
    list.style.display = 'none';

    try {
        const response = await fetch(withProject('/api/stations'));
        if (!response.ok) {
            throw new Error('加载失败');
        }

        const data = await response.json();
        allStations = data.stations || [];
        loading.style.display = 'none';

        if (!allStations.length) {
            empty.style.display = 'block';
            return;
        }

        filterByCounty(document.getElementById('county-filter').value);
        list.style.display = 'block';
    } catch (err) {
        console.error('loadStations failed:', err);
        loading.style.display = 'none';
        error.style.display = 'flex';
    }
}

function renderStations(stations) {
    const tbody = document.getElementById('station-tbody');
    tbody.innerHTML = stations.map((station) => `
        <tr>
            <td class="station-name" data-label="变电站名称">${escapeHtml(station.name)}</td>
            <td data-label="电压等级">${escapeHtml(station.voltage_level || '-')}</td>
            <td data-label="区县">${escapeHtml(station.county || '-')}</td>
            <td data-label="位置">${escapeHtml(station.location || '-')}</td>
            <td data-label="操作">
                <div class="table-action-group">
                    <button class="btn btn-sm btn-ghost" type="button" onclick="showDetail(${station.id})">查看详情</button>
                </div>
            </td>
        </tr>
    `).join('');
}

function filterByCounty(county) {
    if (!county) {
        renderStations(allStations);
        return;
    }
    renderStations(allStations.filter((station) => station.county === county));
}

function renderRecentFaults(faults) {
    if (!faults || !faults.length) {
        return '<span class="text-muted">暂无故障记录</span>';
    }
    return faults.map((fault) => `
        <span class="slot-fault-badge slot-fault-${escapeHtml(fault.status || 'open')}">
            ${escapeHtml(fault.fault_label || '未命名故障')}
        </span>
    `).join('');
}

function renderSlotCard(slot) {
    const current = slot.current_camera;
    return `
        <div class="slot-card">
            <div class="slot-card-header">
                <div>
                    <div class="slot-title">${escapeHtml(slot.location_desc || slot.area || slot.slot_code || '未命名槽位')}</div>
                    <div class="slot-subtitle">
                        槽位编码 ${escapeHtml(slot.slot_code || '-')}
                        ${slot.channel_number !== null && slot.channel_number !== undefined ? ` | 通道 ${escapeHtml(slot.channel_number)}` : ''}
                    </div>
                </div>
                <div class="slot-stats">
                    <span class="slot-stat">历史设备 ${slot.history_camera_count || 0}</span>
                    <span class="slot-stat">故障 ${slot.fault_count || 0}</span>
                </div>
            </div>
            <div class="slot-current">
                <div class="slot-current-label">当前设备</div>
                ${current ? `
                    <div class="slot-current-main">
                        <span>${escapeHtml(current.project_camera_code || current.camera_index || `#${current.id}`)}</span>
                        <span class="camera-ip">${escapeHtml(current.ip_address || '-')}</span>
                    </div>
                ` : '<div class="text-muted">当前无在用设备</div>'}
            </div>
            ${slot.history_cameras && slot.history_cameras.length ? `
                <div class="slot-history">
                    ${slot.history_cameras.map((camera) => `
                        <div class="slot-history-item">
                            <span>${escapeHtml(camera.project_camera_code || camera.camera_index || `#${camera.id}`)}</span>
                            <span class="camera-ip">${escapeHtml(camera.ip_address || '-')}</span>
                            <span class="slot-history-status">${escapeHtml(camera.status || '-')}</span>
                        </div>
                    `).join('')}
                </div>
            ` : ''}
            <div class="slot-recent-faults">
                ${renderRecentFaults(slot.recent_faults)}
            </div>
        </div>
    `;
}

function renderSlotGroups(slots) {
    if (!slots || !slots.length) {
        return '<p class="text-muted">当前项目下暂无槽位数据</p>';
    }

    const groups = new Map();
    slots.forEach((slot) => {
        const key = slot.project_code || 'unknown';
        if (!groups.has(key)) {
            groups.set(key, {
                project_code: slot.project_code,
                project_name: slot.project_name,
                project_short_name: slot.project_short_name,
                project_color: slot.project_color || '#1a73e8',
                slots: [],
            });
        }
        groups.get(key).slots.push(slot);
    });

    return Array.from(groups.values()).map((group) => `
        <div class="slot-group">
            <div class="slot-group-header">
                <span class="project-pill" style="--project-color:${escapeHtml(group.project_color)};">
                    ${escapeHtml(group.project_short_name || group.project_name || group.project_code || '项目')}
                </span>
                <span class="slot-group-count">${group.slots.length} 个槽位</span>
            </div>
            <div class="slot-grid">
                ${group.slots.map(renderSlotCard).join('')}
            </div>
        </div>
    `).join('');
}

async function showDetail(stationId) {
    const modal = new bootstrap.Modal(document.getElementById('detail-modal'));
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const modalReportBtn = document.getElementById('modal-report-btn');

    modalTitle.textContent = '加载中...';
    modalBody.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>正在加载详情...</span></div>';
    modal.show();

    try {
        const response = await fetch(withProject(`/api/stations/${stationId}`));
        if (!response.ok) {
            throw new Error('加载详情失败');
        }

        const data = await response.json();
        const station = data.station || {};
        const cameras = data.cameras || [];

        modalTitle.textContent = station.name || '变电站详情';
        modalBody.innerHTML = `
            <div class="detail-info">
                <div class="detail-row">
                    <span class="detail-label">电压等级</span>
                    <span class="detail-value">${escapeHtml(station.voltage_level || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">区县</span>
                    <span class="detail-value">${escapeHtml(station.county || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">位置</span>
                    <span class="detail-value">${escapeHtml(station.location || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">摄像头数</span>
                    <span class="detail-value">${cameras.length}</span>
                </div>
            </div>
            ${cameras.length ? `
                <h6 class="detail-subtitle">当前摄像头</h6>
                <div class="camera-list">
                    ${cameras.map((camera) => `
                        <div class="camera-item">
                            <span class="camera-location">${escapeHtml(camera.location_desc || camera.area || '-')}</span>
                            <span class="camera-ip">${escapeHtml(camera.ip_address || '-')}</span>
                        </div>
                    `).join('')}
                </div>
            ` : '<p class="text-muted">暂无摄像头数据</p>'}
        `;

        modalReportBtn.href = withProject('/fault/new', { station_id: stationId });
    } catch (err) {
        console.error('showDetail failed:', err);
        modalTitle.textContent = '加载失败';
        modalBody.innerHTML = '<p class="text-danger">加载详情失败，请稍后重试。</p>';
    }
}

function openCreateModal() {
    document.getElementById('create-station-form').reset();
    document.getElementById('create-error').style.display = 'none';
    new bootstrap.Modal(document.getElementById('create-modal')).show();
}

async function submitCreateStation() {
    const form = document.getElementById('create-station-form');
    const errorEl = document.getElementById('create-error');
    const submitBtn = document.getElementById('create-submit-btn');

    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    submitBtn.disabled = true;
    errorEl.style.display = 'none';

    try {
        const payload = Object.fromEntries(new FormData(form).entries());
        const response = await fetch('/admin/stations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok) {
            errorEl.textContent = response.status === 403
                ? '仅管理员可以新建变电站，请先使用管理员账号登录。'
                : (result.error || '创建失败');
            errorEl.style.display = 'block';
            return;
        }

        bootstrap.Modal.getInstance(document.getElementById('create-modal')).hide();
        await loadStations();
    } catch (err) {
        console.error('submitCreateStation failed:', err);
        errorEl.textContent = '网络错误，请稍后重试。';
        errorEl.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
    }
}

async function showDetail(stationId) {
    const modal = new bootstrap.Modal(document.getElementById('detail-modal'));
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const modalReportBtn = document.getElementById('modal-report-btn');

    modalTitle.textContent = '加载中...';
    modalBody.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>正在加载详情...</span></div>';
    modal.show();

    try {
        const [stationResponse, slotsResponse] = await Promise.all([
            fetch(withProject(`/api/stations/${stationId}`)),
            fetch(withProject(`/api/stations/${stationId}/slots`)),
        ]);
        if (!stationResponse.ok || !slotsResponse.ok) {
            throw new Error('加载详情失败');
        }

        const stationData = await stationResponse.json();
        const slotsData = await slotsResponse.json();
        const station = stationData.station || {};
        const cameras = stationData.cameras || [];
        const slots = slotsData.slots || [];

        modalTitle.textContent = station.name || '变电站详情';
        modalBody.innerHTML = `
            <div class="detail-info">
                <div class="detail-row">
                    <span class="detail-label">电压等级</span>
                    <span class="detail-value">${escapeHtml(station.voltage_level || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">区县</span>
                    <span class="detail-value">${escapeHtml(station.county || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">位置</span>
                    <span class="detail-value">${escapeHtml(station.location || '-')}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">当前设备数</span>
                    <span class="detail-value">${cameras.length}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">槽位数</span>
                    <span class="detail-value">${slots.length}</span>
                </div>
            </div>
            <h6 class="detail-subtitle">项目 / 槽位 / 当前设备</h6>
            ${renderSlotGroups(slots)}
        `;

        modalReportBtn.href = withProject('/fault/new', { station_id: stationId });
    } catch (err) {
        console.error('showDetail failed:', err);
        modalTitle.textContent = '加载失败';
        modalBody.innerHTML = '<p class="text-danger">加载详情失败，请稍后重试。</p>';
    }
}

document.getElementById('county-filter').addEventListener('change', (event) => {
    filterByCounty(event.target.value);
});

document.addEventListener('DOMContentLoaded', async () => {
    if (window.AppProjectState && typeof window.AppProjectState.ready === 'function') {
        await window.AppProjectState.ready();
    }
    await loadStations();
});
</script>
{% endblock %}
