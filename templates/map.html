{% extends "base.html" %}

{% block title %}地图 - 变电站图像监控运维平台{% endblock %}

{% block page_title %}变电站分布地图{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
{% endblock %}

{% block content %}
<div style="margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;">
    <div style="display: flex; align-items: center; gap: 12px;">
        <select id="year-filter" class="form-select-filter">
            <option value="">全部年份</option>
        </select>
        <span class="text-muted" style="font-size: 13px; color: var(--text-secondary);">点击标记查看详情</span>
    </div>
</div>

<div id="map-tile-warning" class="alert alert-warning" style="display: none; margin-bottom: 12px;"></div>
<div id="map" style="height: calc(100vh - 200px); min-height: 400px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); z-index: 1;"></div>

<div class="map-legend">
    <div class="legend-item">
        <span class="legend-dot high"></span>
        <span>故障次数 >= 10</span>
    </div>
    <div class="legend-item">
        <span class="legend-dot medium"></span>
        <span>故障次数 5-9</span>
    </div>
    <div class="legend-item">
        <span class="legend-dot low"></span>
        <span>故障次数 &lt; 5</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COUNTY_CENTERS = {
    '丽水': { lat: 28.4672, lng: 119.9222 },
    '云和': { lat: 28.1353, lng: 119.5579 },
    '庆元': { lat: 27.6205, lng: 119.6205 },
    '景宁': { lat: 27.9831, lng: 119.6333 },
    '松阳': { lat: 28.4497, lng: 119.4811 },
    '缙云': { lat: 28.6609, lng: 120.0778 },
    '遂昌': { lat: 28.5931, lng: 119.2761 },
    '青田': { lat: 28.0534, lng: 120.2991 },
    '龙泉': { lat: 27.9237, lng: 119.1317 }
};

const OFFSETS = [
    { lat: 0.02, lng: 0.02 },
    { lat: 0.02, lng: -0.02 },
    { lat: -0.02, lng: 0.02 },
    { lat: -0.02, lng: -0.02 },
    { lat: 0.04, lng: 0 },
    { lat: -0.04, lng: 0 },
    { lat: 0, lng: 0.04 },
    { lat: 0, lng: -0.04 },
    { lat: 0.03, lng: 0.03 },
    { lat: -0.03, lng: -0.03 }
];

const MAP_TILE_PROVIDERS = {{ map_tile_providers | tojson }};

let map;
let stationsData = [];
let currentYear = '';
let stationMarkersLayer;
let stationMarkersById = new Map();
let activeTileLayer = null;
let activeTileProviderIndex = 0;

function getYearFilter() {
    return currentYear ? { year: currentYear } : {};
}

function getFocusedStationId() {
    return new URLSearchParams(window.location.search).get('station_id') || '';
}

function getTileWarningElement() {
    return document.getElementById('map-tile-warning');
}

function hideTileWarning() {
    const el = getTileWarningElement();
    if (!el) {
        return;
    }
    el.style.display = 'none';
    el.textContent = '';
}

function showTileWarning(message) {
    const el = getTileWarningElement();
    if (!el) {
        return;
    }
    el.textContent = message;
    el.style.display = 'block';
}

function buildTileLayer(providerIndex) {
    const provider = MAP_TILE_PROVIDERS[providerIndex];
    if (!provider || !provider.url) {
        return null;
    }

    const layer = L.tileLayer(provider.url, {
        attribution: provider.attribution || '',
        maxZoom: provider.maxZoom || 18,
        subdomains: provider.subdomains && provider.subdomains.length ? provider.subdomains : undefined,
        crossOrigin: true,
    });

    let handledFailure = false;
    layer.on('load', () => {
        hideTileWarning();
    });

    layer.on('tileerror', () => {
        if (handledFailure || activeTileProviderIndex !== providerIndex) {
            return;
        }
        handledFailure = true;

        const nextIndex = providerIndex + 1;
        if (MAP_TILE_PROVIDERS[nextIndex] && MAP_TILE_PROVIDERS[nextIndex].url) {
            showTileWarning('当前地图底图加载失败，正在切换备用底图。');
            switchTileProvider(nextIndex);
            return;
        }

        showTileWarning('地图底图加载失败，可能是网络或第三方地图服务不可用。站点标记和定位功能仍可使用。');
    });

    return layer;
}

function switchTileProvider(providerIndex) {
    const nextLayer = buildTileLayer(providerIndex);
    if (!nextLayer) {
        showTileWarning('未配置可用的地图底图服务。');
        return;
    }

    if (activeTileLayer) {
        map.removeLayer(activeTileLayer);
    }

    activeTileProviderIndex = providerIndex;
    activeTileLayer = nextLayer;
    activeTileLayer.addTo(map);
}

function focusStationMarker() {
    const stationId = Number(getFocusedStationId());
    if (!stationId) {
        return;
    }
    const marker = stationMarkersById.get(stationId);
    if (!marker) {
        return;
    }
    const latLng = marker.getLatLng();
    map.setView(latLng, 14, { animate: true });
    marker.openPopup();
}

async function initMap() {
    if (window.AppProjectState && typeof window.AppProjectState.ready === 'function') {
        await window.AppProjectState.ready();
    }

    map = L.map('map').setView([28.3, 119.6], 10);
    stationMarkersLayer = L.layerGroup().addTo(map);
    switchTileProvider(0);

    await populateYearFilter();
    await loadStationsForMap();
}

async function populateYearFilter() {
    try {
        const res = await fetch(withProject('/api/faults'));
        const data = await res.json();
        const years = new Set();

        (data.faults || []).forEach(fault => {
            if (fault.created_at) {
                years.add(fault.created_at.substring(0, 4));
            }
        });

        const select = document.getElementById('year-filter');
        const sortedYears = [...years].sort((a, b) => b - a);
        sortedYears.forEach(year => {
            const opt = document.createElement('option');
            opt.value = year;
            opt.textContent = `${year} 年`;
            select.appendChild(opt);
        });
    } catch (error) {
        console.error('加载年份列表失败:', error);
    }
}

async function loadStationsForMap() {
    try {
        if (stationMarkersLayer) {
            stationMarkersLayer.clearLayers();
        }
        stationMarkersById = new Map();

        const response = await fetch(withProject('/api/stations'));
        const data = await response.json();
        stationsData = data.stations || [];

        const faultsResponse = await fetch(withProject('/api/faults', getYearFilter()));
        const faultsData = await faultsResponse.json();
        const faults = faultsData.faults || [];

        const faultCountByStation = {};
        faults.forEach(fault => {
            if (fault.station_id) {
                faultCountByStation[fault.station_id] = (faultCountByStation[fault.station_id] || 0) + 1;
            }
        });

        const camerasResponse = await fetch(withProject('/api/cameras'));
        if (!camerasResponse.ok) {
            throw new Error('加载摄像头数据失败');
        }
        const camerasData = await camerasResponse.json();
        const cameras = camerasData.cameras || [];

        const cameraCountByStation = {};
        cameras.forEach(camera => {
            if (camera.station_id) {
                cameraCountByStation[camera.station_id] = (cameraCountByStation[camera.station_id] || 0) + 1;
            }
        });

        const countyGroups = {};
        stationsData.forEach(station => {
            const county = station.county || '未知';
            if (!countyGroups[county]) {
                countyGroups[county] = [];
            }
            countyGroups[county].push(station);
        });

        Object.entries(countyGroups).forEach(([county, stations]) => {
            const center = COUNTY_CENTERS[county] || { lat: 28.3, lng: 119.6 };

            stations.forEach((station, idx) => {
                const faultCount = faultCountByStation[station.id] || 0;
                const cameraCount = cameraCountByStation[station.id] || 0;
                const faultRate = cameraCount > 0 ? (faultCount / cameraCount * 100).toFixed(1) : 0;
                const color = faultCount >= 10 ? '#d93025' : (faultCount >= 5 ? '#f9ab00' : '#1e8e3e');

                let lat;
                let lng;
                if (station.latitude && station.longitude) {
                    lat = parseFloat(station.latitude);
                    lng = parseFloat(station.longitude);
                } else {
                    const offset = OFFSETS[idx % OFFSETS.length];
                    lat = center.lat + offset.lat;
                    lng = center.lng + offset.lng;
                }

                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="
                        background: ${color};
                        width: 24px;
                        height: 24px;
                        border-radius: 50%;
                        border: 3px solid white;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-size: 11px;
                        font-weight: bold;
                    ">${stations.length > 1 ? (idx + 1) : ''}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([lat, lng], { icon }).addTo(stationMarkersLayer);
                stationMarkersById.set(Number(station.id), marker);

                marker.bindPopup(`
                    <div class="station-popup">
                        <h4>${escapeHtml(station.name)}</h4>
                        <div class="info">电压等级: ${escapeHtml(station.voltage_level || '-')}</div>
                        <div class="info">县区: ${escapeHtml(station.county || '-')}</div>
                        <div class="camera-count">摄像头: ${cameraCount} 个</div>
                        <div class="camera-count">故障: ${faultCount} 次 (${faultRate}%)</div>
                        <div class="action">
                            <a href="${withProject('/fault/new', { station_id: station.id })}" class="btn btn-sm btn-primary">报故障</a>
                        </div>
                    </div>
                `);
            });
        });

        focusStationMarker();

        if (stationsData.length === 1 && !getFocusedStationId()) {
            const station = stationsData[0];
            const center = COUNTY_CENTERS[station.county];
            if (center) {
                map.setView([center.lat, center.lng], 13);
            }
        }
    } catch (error) {
        console.error('加载地图数据失败:', error);
    }
}

document.getElementById('year-filter').addEventListener('change', async function() {
    currentYear = this.value;
    await loadStationsForMap();
});

document.addEventListener('DOMContentLoaded', initMap);
</script>
{% endblock %}
