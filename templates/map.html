{% extends "base.html" %}

{% block title %}地图 - 变电站图像监控运维平台{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2 class="page-title">变电站分布地图</h2>
        <div class="page-actions">
            <select id="year-filter" class="form-select">
                <option value="">全部年份</option>
            </select>
            <span class="text-muted" style="font-size: 13px; color: var(--color-text-secondary);">点击标记查看详情</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="map-legend">
        <div class="legend-item">
            <span class="legend-dot high"></span>
            <span>故障次数 ≥10</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot medium"></span>
            <span>故障次数 5-9</span>
        </div>
        <div class="legend-item">
            <span class="legend-dot low"></span>
            <span>故障次数 &lt;5</span>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// 丽水地区各县区中心坐标
const COUNTY_CENTERS = {
    '丽水': { lat: 28.4672, lng: 119.9222 },
    '云和': { lat: 28.1353, lng: 119.5579 },
    '庆元': { lat: 27.6205, lng: 119.6205 },
    '景宁': { lat: 27.9831, lng: 119.6333 },
    '松阳': { lat: 28.4497, lng: 119.4811 },
    '缙云': { lat: 28.6609, lng: 120.0778 },
    '遂昌': { lat: 28.5931, lng: 119.2761 },
    '青田': { lat: 28.0534, lng: 120.2991 },
    '龙泉': { lat: 27.9237, lng: 119.1317 }
};

// 分散标记的偏移量
const OFFSETS = [
    { lat: 0.02, lng: 0.02 },
    { lat: 0.02, lng: -0.02 },
    { lat: -0.02, lng: 0.02 },
    { lat: -0.02, lng: -0.02 },
    { lat: 0.04, lng: 0 },
    { lat: -0.04, lng: 0 },
    { lat: 0, lng: 0.04 },
    { lat: 0, lng: -0.04 },
    { lat: 0.03, lng: 0.03 },
    { lat: -0.03, lng: -0.03 }
];

let map;
let stationsData = [];
let currentYear = '';

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getYearFilter() {
    return currentYear ? `?year=${currentYear}` : '';
}

async function initMap() {
    // 初始化地图
    map = L.map('map').setView([28.3, 119.6], 10);

    // 添加底图
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 18
    }).addTo(map);

    // 加载年份列表
    await populateYearFilter();
    // 加载数据
    await loadStationsForMap();
}

async function populateYearFilter() {
    try {
        const res = await fetch('/api/faults');
        const data = await res.json();
        const years = new Set();
        (data.faults || []).forEach(f => {
            if (f.created_at) {
                years.add(f.created_at.substring(0, 4));
            }
        });
        const select = document.getElementById('year-filter');
        const sortedYears = [...years].sort((a, b) => b - a);
        sortedYears.forEach(y => {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y + ' 年';
            select.appendChild(opt);
        });
    } catch (error) {
        console.error('加载年份列表失败:', error);
    }
}

async function loadStationsForMap() {
    try {
        const response = await fetch('/api/stations');
        const data = await response.json();
        stationsData = data.stations || [];

        // 获取故障统计（带年份筛选）
        const faultsResponse = await fetch('/api/faults' + getYearFilter());
        const faultsData = await faultsResponse.json();
        const faults = faultsData.faults || [];

        // 按变电站统计故障数
        const faultCountByStation = {};
        faults.forEach(f => {
            if (f.station_id) {
                faultCountByStation[f.station_id] = (faultCountByStation[f.station_id] || 0) + 1;
            }
        });

        // 获取摄像头数量
        const camerasResponse = await fetch('/api/cameras');
        const camerasData = await camerasResponse.json();
        const cameras = camerasData.cameras || [];

        const cameraCountByStation = {};
        cameras.forEach(c => {
            if (c.station_id) {
                cameraCountByStation[c.station_id] = (cameraCountByStation[c.station_id] || 0) + 1;
            }
        });

        // 按县区分组添加标记
        const countyGroups = {};
        stationsData.forEach(station => {
            const county = station.county || '未知';
            if (!countyGroups[county]) {
                countyGroups[county] = [];
            }
            countyGroups[county].push(station);
        });

        // 为每个县添加标记
        Object.entries(countyGroups).forEach(([county, stations]) => {
            const center = COUNTY_CENTERS[county] || { lat: 28.3, lng: 119.6 };

            stations.forEach((station, idx) => {
                const faultCount = faultCountByStation[station.id] || 0;
                const cameraCount = cameraCountByStation[station.id] || 0;
                const faultRate = cameraCount > 0 ? (faultCount / cameraCount * 100).toFixed(1) : 0;

                // 计算标记颜色（按故障次数）
                const colorClass = faultCount >= 10 ? 'high' : (faultCount >= 5 ? 'medium' : 'low');
                const color = faultCount >= 10 ? '#d93025' : (faultCount >= 5 ? '#f9ab00' : '#1e8e3e');

                // 优先使用真实坐标，否则使用县区中心+偏移
                let lat, lng;
                if (station.latitude && station.longitude) {
                    lat = parseFloat(station.latitude);
                    lng = parseFloat(station.longitude);
                } else {
                    const offset = OFFSETS[idx % OFFSETS.length];
                    lat = center.lat + offset.lat;
                    lng = center.lng + offset.lng;
                }

                // 创建自定义图标
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="
                        background: ${color};
                        width: 24px;
                        height: 24px;
                        border-radius: 50%;
                        border: 3px solid white;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-size: 11px;
                        font-weight: bold;
                    ">${stations.length > 1 ? (idx + 1) : ''}</div>`,
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([lat, lng], { icon }).addTo(map);

                marker.bindPopup(`
                    <div class="station-popup">
                        <h4>${escapeHtml(station.name)}</h4>
                        <div class="info">电压等级: ${escapeHtml(station.voltage_level || '-')}</div>
                        <div class="info">县区: ${escapeHtml(station.county || '-')}</div>
                        <div class="camera-count">摄像头: ${cameraCount}个</div>
                        <div class="camera-count">故障: ${faultCount}次 (${faultRate}%)</div>
                        <div class="action">
                            <a href="/fault/new?station_id=${station.id}" class="btn btn-sm btn-primary">报故障</a>
                        </div>
                    </div>
                `);
            });
        });

        // 如果只有一个变电站，直接放大到该位置
        if (stationsData.length === 1) {
            const station = stationsData[0];
            const county = station.county;
            const center = COUNTY_CENTERS[county];
            if (center) {
                map.setView([center.lat, center.lng], 13);
            }
        }

    } catch (error) {
        console.error('加载地图数据失败:', error);
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 年份筛选变化时重新加载
document.getElementById('year-filter').addEventListener('change', async function() {
    currentYear = this.value;
    await loadStationsForMap();
});

document.addEventListener('DOMContentLoaded', initMap);
</script>
{% endblock %}
