{% extends "base.html" %}

{% block title %}登录 - 变电站图像监控运维平台{% endblock %}

{% block extra_head %}
<style>
.login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--color-bg);
}
.login-card {
    background: var(--color-surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: var(--space-xl);
    width: 100%;
    max-width: 380px;
}
.login-title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: var(--space-lg);
}
.login-error {
    background: var(--color-danger-bg);
    color: var(--color-danger);
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-sm);
    margin-bottom: var(--space-md);
    font-size: 14px;
    display: none;
}
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1 class="login-title">变电站图像监控运维平台</h1>

        <div id="login-error" class="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="username" class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" required placeholder="请输入用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">密码</label>
                <input type="password" id="password" class="form-input" required placeholder="请输入密码" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="login-btn">登录</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            // 登录成功，跳转到首页
            window.location.href = '/';
        } else {
            errorDiv.textContent = data.error || '登录失败';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登录';
        }
    } catch (error) {
        errorDiv.textContent = '网络错误，请重试';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    }
});
</script>
{% endblock %}
