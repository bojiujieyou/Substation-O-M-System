{% extends "base.html" %}

{% block title %}登录 - 变电站图像监控运维平台{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1 class="login-title">变电站图像监控运维平台</h1>

        <div id="login-error" class="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="text" id="username" class="form-input" required placeholder="用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <div class="password-input-wrap">
                    <input type="password" id="password" class="form-input" required placeholder="密码" autocomplete="current-password">
                    <button type="button" id="toggle-password" class="password-toggle-btn" title="显示密码">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px 20px; font-size: 16px;" id="login-btn">登录</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('toggle-password').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const eye = document.getElementById('eye-icon');
    const eyeOff = document.getElementById('eye-off-icon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        eye.style.display = 'none';
        eyeOff.style.display = 'block';
    } else {
        pwd.type = 'password';
        eye.style.display = 'block';
        eyeOff.style.display = 'none';
    }
});

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
            // 登录成功，跳转到首页
            window.location.href = '/';
        } else {
            errorDiv.textContent = data.error || '登录失败';
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登录';
        }
    } catch (error) {
        errorDiv.textContent = '网络错误，请重试';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    }
});
</script>
{% endblock %}
