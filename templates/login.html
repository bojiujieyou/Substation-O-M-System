{% extends "base.html" %}

{% block title %}登录 - 变电站图像监控运维平台{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <h1 class="login-title">变电站图像监控运维平台</h1>

        <div id="login-error" class="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <input type="text" id="username" class="form-input" required placeholder="用户名" autocomplete="username">
            </div>
            <div class="form-group">
                <div class="password-input-wrap">
                    <input type="password" id="password" class="form-input" required placeholder="密码" autocomplete="current-password">
                    <button type="button" id="toggle-password" class="password-toggle-btn" title="显示密码" aria-label="显示密码">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="login-remember-row">
                <label class="login-remember-option" for="remember-username">
                    <input type="checkbox" id="remember-username">
                    <span>记住账号</span>
                </label>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px 20px; font-size: 16px;" id="login-btn">登录</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const USERNAME_STORAGE_KEY = 'substation.login.rememberedUsername';

const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const rememberUsernameCheckbox = document.getElementById('remember-username');

function loadRememberedUsername() {
    const savedUsername = localStorage.getItem(USERNAME_STORAGE_KEY) || '';
    if (savedUsername) {
        usernameInput.value = savedUsername;
        rememberUsernameCheckbox.checked = true;
    }
}

function persistRememberedUsername(username) {
    if (rememberUsernameCheckbox.checked) {
        localStorage.setItem(USERNAME_STORAGE_KEY, username);
    } else {
        localStorage.removeItem(USERNAME_STORAGE_KEY);
    }
}

// 清理旧版可能残留的密码存储
localStorage.removeItem('substation.login.rememberedPassword');

document.getElementById('toggle-password').addEventListener('click', function() {
    const eye = document.getElementById('eye-icon');
    const eyeOff = document.getElementById('eye-off-icon');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eye.style.display = 'none';
        eyeOff.style.display = 'block';
    } else {
        passwordInput.type = 'password';
        eye.style.display = 'block';
        eyeOff.style.display = 'none';
    }
});

loadRememberedUsername();

function readResponseMessage(response, payload, fallbackMessage) {
    if (payload && typeof payload === 'object' && payload.error) {
        return payload.error;
    }
    if (typeof payload === 'string' && payload.trim()) {
        return payload.trim();
    }
    if (response.status === 401) {
        return '用户名或密码错误';
    }
    if (response.status === 429) {
        return fallbackMessage || '登录尝试次数过多，请稍后重试';
    }
    return fallbackMessage || `登录失败（HTTP ${response.status}）`;
}

async function parseLoginResponse(response) {
    const contentType = response.headers.get('Content-Type') || '';
    if (contentType.includes('application/json')) {
        try {
            return await response.json();
        } catch (error) {
            return null;
        }
    }

    try {
        return await response.text();
    } catch (error) {
        return null;
    }
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;
    const errorDiv = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');

    errorDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password })
        });

        const payload = await parseLoginResponse(response);

        if (response.ok) {
            persistRememberedUsername(username);
            window.location.href = '/';
            return;
        }

        errorDiv.textContent = readResponseMessage(response, payload, '登录失败，请重试');
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    } catch (error) {
        errorDiv.textContent = error && error.message ? error.message : '网络错误，请重试';
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    }
});
</script>
{% endblock %}
