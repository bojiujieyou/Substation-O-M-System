{% extends "base.html" %}

{% block title %}统计报表 - 变电站图像监控运维平台{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2 class="page-title">统计报表</h2>
        <div class="page-header-actions">
            <select id="year-filter" class="form-select">
                <option value="">全部年份</option>
            </select>
            <button id="export-btn" class="btn btn-secondary btn-sm" type="button" onclick="exportStats()">
                导出Excel
            </button>
        </div>
    </div>

    <!-- 概览统计 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="total-stations">-</div>
            <div class="stat-label">变电站总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-cameras">-</div>
            <div class="stat-label">摄像头总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-faults">-</div>
            <div class="stat-label">故障报修总数</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="fault-rate">-</div>
            <div class="stat-label">故障率</div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row">
        <div class="col-md-6">
            <div class="chart-section">
                <h3>月度故障趋势</h3>
                <div class="chart-container">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-section">
                <h3>摄像机故障维修排行 Top 5</h3>
                <div class="chart-container" style="height: auto; min-height: 200px;">
                    <table class="data-table" id="camera-ranking-table">
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>摄像机位置</th>
                                <th>变电站</th>
                                <th>故障次数</th>
                            </tr>
                        </thead>
                        <tbody id="camera-ranking-body">
                            <tr><td colspan="4" class="text-muted">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="chart-section">
                <h3>各县区故障统计</h3>
                <div class="chart-container">
                    <canvas id="countyChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-section">
                <h3>各电压等级统计</h3>
                <div class="chart-container">
                    <canvas id="voltageChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.page-header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
}
.page-header-actions .form-select {
    width: auto;
    min-width: 140px;
}
.rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #1a73e8;
    color: white;
    font-weight: bold;
    font-size: 12px;
}
.rank-badge:nth-child(1) { background: #d93025; }
.rank-badge:nth-child(2) { background: #f9ab00; }
.rank-badge:nth-child(3) { background: #1e8e3e; }
.fault-count {
    font-weight: bold;
    color: #d93025;
}
</style>
<script src="{{ url_for('static', filename='chart-4.4.1.min.js') }}"></script>
<script>
let monthlyChart, countyChart, voltageChart;
let currentYear = '';

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getYearFilter() {
    return currentYear ? `?year=${currentYear}` : '';
}

async function loadStats() {
    try {
        // 加载统计数据
        const [statsRes, faultsRes, stationsRes] = await Promise.all([
            fetch(`/api/stats${getYearFilter() ? '?' + getYearFilter().slice(1) : ''}`),
            fetch(`/api/faults${getYearFilter()}`),
            fetch('/api/stations')
        ]);

        const stats = await statsRes.json();
        const faults = await faultsRes.json();
        const stations = await stationsRes.json();

        // 更新概览
        document.getElementById('total-stations').textContent = stats.stations || 0;
        document.getElementById('total-cameras').textContent = stats.cameras || 0;
        document.getElementById('total-faults').textContent = stats.faults || 0;

        const faultRate = stats.cameras > 0 ? ((stats.faults / stats.cameras) * 100).toFixed(1) + '%' : '0%';
        document.getElementById('fault-rate').textContent = faultRate;

        // 处理图表数据
        processChartData(faults.faults || [], stations.stations || []);

    } catch (error) {
        console.error('加载统计失败:', error);
    }
}

function populateYearFilter(faults) {
    const years = new Set();
    faults.forEach(f => {
        if (f.created_at) {
            const y = f.created_at.substring(0, 4);
            years.add(y);
        }
    });

    const select = document.getElementById('year-filter');
    // 保留"全部年份"选项
    const allOption = select.options[0];
    select.innerHTML = '';
    select.appendChild(allOption);

    const sortedYears = [...years].sort((a, b) => b - a);
    sortedYears.forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + ' 年';
        select.appendChild(opt);
    });
}

function processChartData(faults, stations) {
    // 月度故障趋势
    const monthlyData = {};
    const now = new Date();
    const selectedYear = currentYear || now.getFullYear();

    if (currentYear) {
        // 显示选中年份的全部12个月
        for (let m = 1; m <= 12; m++) {
            const key = `${selectedYear}-${String(m).padStart(2, '0')}`;
            monthlyData[key] = 0;
        }
    } else {
        // 显示最近6个月
        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            monthlyData[key] = 0;
        }
    }

    faults.forEach(f => {
        if (f.created_at) {
            const month = f.created_at.substring(0, 7);
            if (month in monthlyData) {
                monthlyData[month]++;
            }
        }
    });

    const monthlyLabels = Object.keys(monthlyData).map(m => {
        const [y, mm] = m.split('-');
        return `${parseInt(mm)}月`;
    });
    const monthlyValues = Object.values(monthlyData);

    if (monthlyChart) monthlyChart.destroy();
    monthlyChart = new Chart(document.getElementById('monthlyChart'), {
        type: 'bar',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: '故障数量',
                data: monthlyValues,
                backgroundColor: '#1a73e8'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } }
        }
    });

    // 摄像机故障维修排行 Top 5
    const cameraData = {};
    faults.forEach(f => {
        if (f.camera_id && f.camera_location) {
            const key = f.camera_id;
            if (!cameraData[key]) {
                cameraData[key] = { count: 0, location: f.camera_location, station_name: f.station_name };
            }
            cameraData[key].count++;
        }
    });

    const topCameras = Object.entries(cameraData)
        .sort((a, b) => b[1].count - a[1].count)
        .slice(0, 5);

    const tbody = document.getElementById('camera-ranking-body');
    if (topCameras.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-muted">暂无数据</td></tr>';
    } else {
        tbody.innerHTML = topCameras.map(([camId, data], idx) => {
        const rankColors = ['#d93025', '#f9ab00', '#1e8e3e', '#1a73e8', '#5f6368'];
        const rankColor = rankColors[idx] || '#5f6368';
        return `
            <tr>
                <td><span class="rank-badge" style="background:${rankColor}">${idx + 1}</span></td>
                <td>${escapeHtml(data.location || '-')}</td>
                <td>${escapeHtml(data.station_name || '-')}</td>
                <td><span class="fault-count">${data.count}</span></td>
            </tr>
        `;
    }).join('');
    }

    // 各县区统计（按故障数统计，非变电站数）
    const stationCountyMap = {};
    const stationVoltageMap = {};
    stations.forEach(s => {
        stationCountyMap[s.id] = s.county || '未知';
        stationVoltageMap[s.id] = s.voltage_level || '其他';
    });

    const countyFaultStats = {};
    const voltageFaultStats = {};
    faults.forEach(f => {
        const county = stationCountyMap[f.station_id] || '未知';
        const voltage = stationVoltageMap[f.station_id] || '其他';
        countyFaultStats[county] = (countyFaultStats[county] || 0) + 1;
        voltageFaultStats[voltage] = (voltageFaultStats[voltage] || 0) + 1;
    });

    if (countyChart) countyChart.destroy();
    countyChart = new Chart(document.getElementById('countyChart'), {
        type: 'bar',
        data: {
            labels: Object.keys(countyFaultStats).sort((a, b) => countyFaultStats[b] - countyFaultStats[a]),
            datasets: [{
                label: '故障数量',
                data: Object.keys(countyFaultStats).sort((a, b) => countyFaultStats[b] - countyFaultStats[a]).map(k => countyFaultStats[k]),
                backgroundColor: '#1e8e3e'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            indexAxis: 'y'
        }
    });

    if (voltageChart) voltageChart.destroy();
    voltageChart = new Chart(document.getElementById('voltageChart'), {
        type: 'pie',
        data: {
            labels: Object.keys(voltageFaultStats),
            datasets: [{
                data: Object.values(voltageFaultStats),
                backgroundColor: ['#1a73e8', '#f9ab00', '#9aa0a6', '#1e8e3e']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'right' } }
        }
    });
}

// 先加载全部数据用于提取年份列表，再初始化
async function initPage() {
    try {
        const res = await fetch('/api/faults');
        const data = await res.json();
        populateYearFilter(data.faults || []);
    } catch (error) {
        console.error('加载年份列表失败:', error);
    }
    await loadStats();
}

document.getElementById('year-filter').addEventListener('change', async function() {
    currentYear = this.value;
    await loadStats();
});

function exportStats() {
    const yearFilter = document.getElementById('year-filter').value;
    const url = '/api/statistics/export' + (yearFilter ? `?year=${yearFilter}` : '');
    window.location.href = url;
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
{% endblock %}
