{% extends "base.html" %}

{% block title %}首页 - 变电站图像监控运维平台{% endblock %}

{% block content %}
<div class="container">
    <section class="card ops-status-strip">
        <div class="ops-status-main">
            <span id="ops-status-dot" class="ops-status-dot"></span>
            <span id="ops-status-text" class="ops-status-text">加载中...</span>
            <span class="ops-status-time">最后刷新 <strong id="last-refresh">-</strong></span>
            <span class="ops-status-time">每 60 秒自动刷新（后台暂停）</span>
        </div>
        <button id="manual-refresh" class="btn btn-secondary btn-sm" type="button">手动刷新</button>
    </section>

    <section class="stats-section home-kpi-section">
        <div class="stats-grid home-stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-stations">-</div>
                <div class="stat-label">变电站</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-cameras">-</div>
                <div class="stat-label">摄像头</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-faults">-</div>
                <div class="stat-label">故障总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-faults-month">-</div>
                <div class="stat-label">本月故障</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-fault-open">-</div>
                <div class="stat-label">待处理</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-fault-handling">-</div>
                <div class="stat-label">处理中</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-fault-closed">-</div>
                <div class="stat-label">已关闭</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-fault-year">-</div>
                <div class="stat-label">本年故障</div>
            </div>
        </div>
    </section>

    <h2 class="visually-hidden">数据可视化</h2>
    <section class="row home-chart-row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">故障状态分布</h3>
                    <div class="home-chart-wrap">
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title">县区故障 Top5</h3>
                    <div class="home-chart-wrap">
                        <canvas id="countyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="card home-recent-card">
        <div class="card-body">
            <h3 class="card-title">最近告警 Top 5</h3>
            <table class="data-table table-cards home-recent-table">
                <thead>
                    <tr>
                        <th>站点</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="recent-faults-body">
                    <tr><td colspan="4" class="text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='chart-4.4.1.min.js') }}"></script>
<script>
let refreshTimer = null;
let statusChart = null;
let countyChart = null;
let loading = false;

function withProject(path, extraParams) {
    if (window.AppProjectState && typeof window.AppProjectState.withProject === 'function') {
        return window.AppProjectState.withProject(path, extraParams);
    }
    const url = new URL(path, window.location.origin);
    if (extraParams) {
        Object.entries(extraParams).forEach(([key, value]) => {
            if (value !== undefined && value !== null && value !== '') {
                url.searchParams.set(key, value);
            }
        });
    }
    return `${url.pathname}${url.search}${url.hash}`;
}

function escapeHtml(text) {
    if (text === null || text === undefined) return '';
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}

function formatTime(value) {
    if (!value) return '-';
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return '-';
    return d.toLocaleString('zh-CN', {
        timeZone: 'Asia/Shanghai',
        month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
}

function updateStat(id, value) {
    const el = document.getElementById(id);
    if (!el) return;
    if (typeof value === 'number') {
        el.textContent = value.toLocaleString();
    } else {
        el.textContent = value ?? '-';
    }
}

function statusLabel(status) {
    if (status === 'open') return '待处理';
    if (status === 'handling') return '处理中';
    if (status === 'closed') return '已关闭';
    return status || '-';
}

function setRunStatus(level, message) {
    const dot = document.getElementById('ops-status-dot');
    const text = document.getElementById('ops-status-text');
    dot.classList.remove('is-ok', 'is-warn');
    dot.classList.add(level === 'ok' ? 'is-ok' : 'is-warn');
    text.textContent = message;
}

function setManualRefreshLoading(isLoading) {
    const btn = document.getElementById('manual-refresh');
    if (!btn) return;
    btn.disabled = isLoading;
    btn.textContent = isLoading ? '刷新中...' : '手动刷新';
}

function renderRecentFaults(faults) {
    const tbody = document.getElementById('recent-faults-body');
    if (!faults.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-muted">暂无告警记录</td></tr>';
        return;
    }

    tbody.innerHTML = faults.map(f => `
        <tr>
            <td data-label="站点">${escapeHtml(f.station_name || '-')}</td>
            <td data-label="类型">${escapeHtml(f.fault_type || '-')}</td>
            <td data-label="状态"><span class="badge badge-${escapeHtml(f.status || '')}">${statusLabel(f.status)}</span></td>
            <td data-label="时间">${formatTime(f.created_at)}</td>
        </tr>
    `).join('');
}

function renderStatusChart(openCount, handlingCount, closedCount) {
    const ctx = document.getElementById('statusChart');
    if (!ctx || typeof Chart === 'undefined') return;

    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['待处理', '处理中', '已关闭'],
            datasets: [{
                data: [openCount, handlingCount, closedCount],
                backgroundColor: ['#d93025', '#f9ab00', '#1e8e3e']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}

function renderCountyChart(labels, values) {
    const ctx = document.getElementById('countyChart');
    if (!ctx || typeof Chart === 'undefined') return;

    if (countyChart) countyChart.destroy();
    countyChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: '故障数',
                data: values,
                backgroundColor: '#1a73e8'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            indexAxis: 'y'
        }
    });
}

async function loadDashboardData() {
    if (loading) return;
    loading = true;

    try {
        const [statsRes, faultsRes, stationsRes] = await Promise.allSettled([
            fetch(withProject('/api/stats')),
            fetch(withProject('/api/faults')),
            fetch(withProject('/api/stations'))
        ]);

        let failCount = 0;

        if (statsRes.status === 'fulfilled' && statsRes.value.ok) {
            const stats = await statsRes.value.json();
            updateStat('stat-stations', stats.stations || 0);
            updateStat('stat-cameras', stats.cameras || 0);
            updateStat('stat-faults', stats.faults || 0);
            updateStat('stat-faults-month', stats.faults_this_month || 0);
            updateStat('stat-fault-year', stats.faults_this_year || 0);
        } else {
            failCount++;
            ['stat-stations', 'stat-cameras', 'stat-faults', 'stat-faults-month', 'stat-fault-year'].forEach(id => updateStat(id, '!'));
        }

        let faults = [];
        if (faultsRes.status === 'fulfilled' && faultsRes.value.ok) {
            const faultData = await faultsRes.value.json();
            faults = faultData.faults || [];
        } else {
            failCount++;
        }

        const statusCounts = { open: 0, handling: 0, closed: 0 };
        const recentFaults = [...faults]
            .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
            .slice(0, 5);

        faults.forEach(f => {
            if (f.status in statusCounts) statusCounts[f.status] += 1;
        });

        updateStat('stat-fault-open', statusCounts.open);
        updateStat('stat-fault-handling', statusCounts.handling);
        updateStat('stat-fault-closed', statusCounts.closed);
        renderRecentFaults(recentFaults);
        renderStatusChart(statusCounts.open, statusCounts.handling, statusCounts.closed);

        const countyMap = {};
        if (stationsRes.status === 'fulfilled' && stationsRes.value.ok) {
            const stationsData = await stationsRes.value.json();
            const stations = stationsData.stations || [];
            stations.forEach(s => {
                countyMap[s.id] = s.county || '未知';
            });
        } else {
            failCount++;
        }

        const countyCounts = {};
        faults.forEach(f => {
            const county = countyMap[f.station_id] || '未知';
            countyCounts[county] = (countyCounts[county] || 0) + 1;
        });

        const topCounty = Object.entries(countyCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        renderCountyChart(
            topCounty.length ? topCounty.map(i => i[0]) : ['暂无数据'],
            topCounty.length ? topCounty.map(i => i[1]) : [0]
        );

        document.getElementById('last-refresh').textContent = formatTime(new Date().toISOString());
        setRunStatus(failCount === 0 ? 'ok' : 'warn', failCount === 0 ? '运行正常' : '部分数据异常');
    } catch (error) {
        console.error('首页数据刷新失败:', error);
        setRunStatus('warn', '数据刷新失败');
    } finally {
        loading = false;
    }
}

function stopRefreshTimer() {
    if (!refreshTimer) return;
    clearInterval(refreshTimer);
    refreshTimer = null;
}

function startRefreshTimer() {
    stopRefreshTimer();
    if (document.hidden) return;
    refreshTimer = setInterval(() => {
        loadDashboardData();
    }, 60000);
}

document.getElementById('manual-refresh').addEventListener('click', async () => {
    setManualRefreshLoading(true);
    try {
        await loadDashboardData();
    } finally {
        setManualRefreshLoading(false);
        startRefreshTimer();
    }
});

document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        stopRefreshTimer();
        return;
    }
    loadDashboardData();
    startRefreshTimer();
});

document.addEventListener('pagehide', stopRefreshTimer);

document.addEventListener('DOMContentLoaded', async () => {
    if (window.AppProjectState && typeof window.AppProjectState.ready === 'function') {
        await window.AppProjectState.ready();
    }
    await loadDashboardData();
    startRefreshTimer();
});
</script>
{% endblock %}
